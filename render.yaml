services:
  - type: web
    name: lexguard-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: main
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/lexguard.db
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: MAX_FILE_SIZE_MB
        value: "20"
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health
    autoDeploy: true
